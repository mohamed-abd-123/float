    <form action="">
      <h1>style an html form with css</h1>
      <label for="">first name</label><br />
      <input
        id="fname"
        type="text"
        placeholder="Entrer vote prénom"
        required
      /><br />
      <span id="fnameError" style="color: red"></span>
      <br />
      <label for="">last name</label><br />
      <input
        id="lname"
        type="text"
        placeholder="Entrer votre nom "
        required
      /><br />
      <span id="lnameError" style="color: red"></span><br />
      <label for="">username</label><br />
      <input
        id="username"
        type="text"
        placeholder="Entrer votre bom d'utilisateur"
        required
      /><br />
      <span id="usernameError" style="color: red"></span><br />
      <label for="">date de naissance</label><br />
      <input id="date" type="date" /><br />
      <span id="dateError" style="color: red"></span><br />
      <label for="">email</label><br />
      <input
        id="mail"
        type="email"
        value="@gmail.com"
        placeholder="............@gmail.com"
        required
      /><br />
      <span id="emailError" style="color: red"></span><br />
      <label for="">password</label><br />
      <input
        id="pass"
        type="password"
        placeholder="Entrer votre password"
        required
      /><br />
      <span id="passwordError" style="color: red"></span><br />
      <label for="">country</label><br />
      <select name="" id="">
        <option value=""></option>
        <option value="">Tunis</option>
        <option value="" selected>Sousse</option>
        <option value="">Sfax</option>
        <option value="">Bizerte</option>
        <option value="">Monastir</option>
        <option value="">Mahdia</option></select
      ><br /><br />
      <label for="">Sexe</label><br />
      <input type="radio" name="Sexe" />Homme
      <input type="radio" name="Sexe" />Femme <br /><br />
      <button type="submit" onclick="verif(event)">submit</button>
    </form>
    <script>
      function verif(event) {
        event.preventDefault();
        var j = 0;
        var fname = document.getElementById("fname").value;
        var lname = document.getElementById("lname").value;
        var date = document.getElementById("date").value;
        var user = document.getElementById("username").value;
        var password = document.getElementById("pass").value;
        var mail = document.getElementById("mail").value;
        var mailFormat = /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/;
        var password = document.getElementById("pass").value;

        if (!fname) {
          j++;
          document.getElementById("fname").style.borderColor = "red";
          document.getElementById("fnameError").textContent =
            "veillez entrer votre prénom";
          document.getElementById("fnameError").style.fontSize = "20px";
        } else {
          document.getElementById("fname").style.borderColor = "grey";
          document.getElementById("fnameError").textContent = "";
        }
        if (!lname) {
          j++;
          document.getElementById("lname").style.borderColor = "red";
          document.getElementById("lnameError").textContent =
            "veillez entrer votre nom";
          document.getElementById("lnameError").style.fontSize = "20px";
        } else {
          document.getElementById("lname").style.borderColor = "grey";
          document.getElementById("lnameError").textContent = "";
        }
        if (!date) {
          j++;
          document.getElementById("date").style.borderColor = "red";
          document.getElementById("dateError").textContent =
            "veillez entrer votre date";
          document.getElementById("dateError").style.fontSize = "20px";
        } else {
          document.getElementById("date").style.borderColor = "grey";
          document.getElementById("dateError").textContent = "";
        }
        if (!mail.match(mailFormat)) {
          j++;
          document.getElementById("mail").style.borderColor = "red";
          document.getElementById("emailError").innerHTML =
            "Veuillez saisir votre mail d'utilisateur";
          document.getElementById("emailError").style.fontSize = "20px";
        } else {
          document.getElementById("mail").style.borderColor = "grey";
          document.getElementById("emailError").textContent = "";
        }
        if (!user) {
          j++;
          document.getElementById("username").style.borderColor = "red";
          document.getElementById("usernameError").textContent =
            "veillez entrer votre username";
          document.getElementById("usernameError").style.fontSize = "20px";
        } else {
          document.getElementById("lname").style.borderColor = "grey";
          document.getElementById("lnameError").textContent = "";
        }
        if (!user) {
          j++;
          document.getElementById("username").style.borderColor = "red";
          document.getElementById("usernameError").textContent =
            "veillez entrer votre username";
          document.getElementById("usernameError").style.fontSize = "20px";
        } else {
          document.getElementById("lname").style.borderColor = "grey";
          document.getElementById("lnameError").textContent = "";
        }
        if (!password) {
          j++;
          document.getElementById("pass").style.borderColor = "red";
          document.getElementById("passwordError").textContent =
            "veillez entrer votre username";
          document.getElementById("passwordError").style.fontSize = "20px";
        } else {
          document.getElementById("pass").style.borderColor = "grey";
          document.getElementById("passwordError").textContent = "";
        }
        if (j == 0) {
          alert("Formulaire valide !");
        }
      }
    </script>
